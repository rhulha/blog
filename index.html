<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raymond Hulha's Blog</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.1rem;
      line-height: 1.8;
      color: #1a1a1a;
      background: #ffffff;
      max-width: 700px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      transition: background 0.2s, color 0.2s;
    }
    body.dark {
      color: #e0e0e0;
      background: #181818;
    }
    h1 {
      font-size: 1.9rem;
      line-height: 1.3;
      margin-bottom: 2.5rem;
    }
    ul { list-style: none; margin: 0; padding: 0; }
    li { margin: 1.2rem 0; }
    a { color: #0055cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    body.dark a { color: #6699ff; }
    .date { font-size: 0.9rem; color: #777; margin-left: 0.75rem; }
    body.dark .date { color: #999; }
    #theme-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      font-family: sans-serif;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 4px;
      background: #f0f0f0;
      color: #1a1a1a;
    }
    body.dark #theme-btn {
      background: #2a2a2a;
      color: #e0e0e0;
      border-color: #555;
    }
  </style>
</head>
<body>
<button id="theme-btn">Dark mode</button>
<script>
  const btn = document.getElementById('theme-btn');
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    btn.textContent = 'Light mode';
  }
  btn.addEventListener('click', () => {
    const dark = document.body.classList.toggle('dark');
    btn.textContent = dark ? 'Light mode' : 'Dark mode';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  });
</script>

<h1>Raymond Hulha's Blog</h1>

<ul>
  <li>
    <a href="ai-revolution-game-development.html">Why the AI Revolution Hasn't Hit Game Development Yet — And Why It's Coming Next</a>
    <span class="date">2026-06-02</span>
  </li>
</ul>

</body>
</html>
